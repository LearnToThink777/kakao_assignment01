<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="../css/cssfile.css">
    
    <script src="../js/test.js"></script>
</head>
<body onload="onload()">

    <header>
        
    </header>

    <main id="todo-container">
        
        <h1 id="todo-title">todolist</h1>
        <section id="date-navigation">
            <button type="button" onclick="SpanChangePrevious();"class="nav-btn prev-btn" aria-label="이전 주">&lt;</button>
            <span id="current-week-range">2026-01-01~2026-01-07</span>
            <button type="button" onclick="SpanChangeNext();" class="nav-btn next-btn" aria-label="다음 주">&gt;</button>
        </section>

        <nav id="weekly-calender">
            <div class="day-box" onclick="selectDay(0)">일</div>
            <div class="day-box" onclick="selectDay(1)">월</div>
            <div class="day-box" onclick="selectDay(2)">화</div>
            <div class="day-box" onclick="selectDay(3)">수</div>
            <div class="day-box" onclick="selectDay(4)">목</div>
            <div class="day-box" onclick="selectDay(5)">금</div>
            <div class="day-box" onclick="selectDay(6)">토</div>
        </nav>

        <!--form은 일단 없애기-->
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요" required>
        <button type="submit" id="todo-add-btn" onclick="addTodo()">추가</button>
        

        <section id="todo-filter-tabs">
            <button type="button" class="all-filterBtn" data-filter="all" onclick="createDomTodoList()">전체</button>
            <button type="button" class="active-filterBtn" data-filter="active" onclick="createDomTodoListProgress()">진행 중</button>
            <button type="button" class="completed-filterBtn" data-filter="completed" onclick="createDomTodoListCompleted()">완료</button>
        </section>

        <section id="todo-list-container">
            <!--<article class="todo-item" >
                <div class="todo-content">
                    <span class="todo-text">JS 컴포넌트 구조 설계하기</span>
                </div>
                <div class="todo-actions">
                    <button type="button" class="complete-btn" onclick="checkTodo()">완료</button>
                    <button type="button" class="edit-btn" onclick="updateTodo()">수정</button>
                    <button type="button" class="delete-btn" onclick="deleteTodo()">삭제</button>
                </div>///모든 todo-actions의 부모는 동일 할 것이므로?
            </article> -->
        </section> 

    </main>

</body>
</html>
